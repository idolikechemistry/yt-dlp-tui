# =====================================================================
# GitHub Actions 雲端自動編譯工作流 (yt-dlp-tui_release.yml)
# =====================================================================
# 💡 運作機制：
# 1. 當偵測到您推送了符合 "v*" (如 v0.0.1 或 v0.0.1-beta.1) 格式的標籤時觸發。
# 2. 自動檢查標籤內是否含有 "-"，若有則自動發布為 GitHub Pre-release (預發布) 軟體源。
# 3. 同時啟動三台雲端虛擬主機，平行編譯並上傳 macOS, Windows, Linux 的二進位壓縮包。
name: Build and Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
# =====================================================================
# 第一階段：建立 Release 空殼 (防止多機編譯上傳時發生衝突)
# =====================================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          # 🎯 智慧預發布識別：如果 Ref 名稱內含有 "-" (例如 v0.0.1-beta.1)，則自動標示為 Pre-release 版本
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
# =====================================================================
# 第二階段：三平台平行編譯並上傳執行檔
# =====================================================================
  build:
    name: Build for ${{ matrix.os }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: yt-dlp-tui
            asset_name: yt-dlp-tui-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: yt-dlp-tui.exe
            asset_name: yt-dlp-tui-x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: yt-dlp-tui
            asset_name: yt-dlp-tui-x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # 快取優化：自動快取 Cargo 依賴與編譯中介檔
      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # 3. 專案編譯 (釋出最輕量、最速的 Release 最佳化二進位檔)
      - name: Compile Project
        run: |
          cargo build --release --target ${{ matrix.target }}
      # 4. 產物封裝 (根據不同平台，將執行檔打包並保留可執行權限)
      - name: Package Release Assets (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          powershell Compress-Archive -Path ${{ matrix.bin_name }} -DestinationPath ../../../${{ matrix.asset_name }}.zip
          cd ../../..
      - name: Package Release Assets (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.bin_name }}
          cd ../../..
      # 5. 上傳至 Release 頁面
      - name: Upload Release Asset (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Release Asset (Unix)
        if: matrix.os != 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
